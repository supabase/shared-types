name: Run CI checks

on:
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 4

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: npm

      - name: Run eslint
        run: |
          npm ci
          npm run lint
